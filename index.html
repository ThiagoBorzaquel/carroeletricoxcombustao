<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador TCO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* RESET */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  max-width: 100vw;
  overflow-x: hidden;
  background: #0b1220;
  font-family: Manrope, sans-serif;
  color: #e7edf7;
}

/* CONTAINER (FIX REAL) */
.app-container {
  width: 100%;
  padding: 6px;
  margin: 0 auto;
}

/* DESKTOP */
@media (min-width: 768px) {
  .app-container {
    max-width: 1100px;
  }
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: #0b1220;
  padding: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  z-index: 10;
}

.header h1 {
  font-size: 14px;
}

/* KPI */
.kpi {
  position: sticky;
  top: 42px;
  padding: 6px 0;
}

.center {
  text-align: center;
}

.kpi h2 {
  font-size: 15px;
}

/* CARD */
.card {
  background: #121a2b;
  border-radius: 10px;
  padding: 8px;
  margin-bottom: 6px;
}

/* INPUT (SEM BRANCO) */
input, select {
  width: 100%;
  min-width: 0;
  height: 34px;
  background: #1a2235;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 4px 8px;
  font-size: 13px;
  margin-bottom: 4px;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}

/* PLACEHOLDER */
::placeholder {
  color: #7f8ea3;
}

/* ROW (FIX FLEX) */
.row {
  display: flex;
  gap: 6px;
  width: 100%;
}

.row > * {
  flex: 1;
  min-width: 0;
}

/* BOTÃO */
.btn {
  width: 100%;
  background: #19c37d;
  color: #000;
  padding: 7px;
  border-radius: 8px;
  font-size: 13px;
  margin-top: 6px;
  border: none;
}

/* NAV */
.nav {
  display: flex;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.nav button {
  flex: 1;
  padding: 8px;
  font-size: 12px;
  opacity: 0.5;
  background: none;
  color: white;
  border: none;
}

.nav button.active {
  opacity: 1;
  border-bottom: 2px solid #19c37d;
}

/* TABS */
.tab {
  display: none;
  padding-top: 6px;
}

.tab.active {
  display: block;
}

/* CHART */
.chart {
  height: 140px;
}

/* GARANTIA FINAL */
section, div, form {
  max-width: 100%;
}

</style>
</head>

<body>

<div class="app-container">

  <!-- HEADER -->
  <header class="header">
    <h1>Simulador</h1>
  </header>

  <!-- KPI -->
  <section class="kpi">
    <div class="card center">
      <p>Economia</p>
      <h2 id="kpiSavings">R$ 0</h2>
    </div>
  </section>

  <!-- NAV -->
  <nav class="nav">
    <button class="active" onclick="tab('dados', this)">Dados</button>
    <button onclick="tab('resultado', this)">Resultado</button>
    <button onclick="tab('graficos', this)">Gráficos</button>
  </nav>

  <!-- DADOS -->
  <section id="dados" class="tab active">

    <div class="card">

      <input placeholder="Preço elétrico" name="evPrice">
      <input placeholder="Preço combustão" name="icePrice">

      <div class="row">
        <input placeholder="Km/ano" name="annualKm">
        <input placeholder="Combustível" name="fuelPrice">
      </div>

      <div class="row">
        <input placeholder="Energia" name="energyPrice">
        <input placeholder="IPVA %" name="ipva">
      </div>

    </div>

    <button class="btn">Calcular</button>

  </section>

  <!-- RESULTADO -->
  <section id="resultado" class="tab">

    <div class="card">
      <p>Payback</p>
      <h3 id="kpiPayback">-</h3>
    </div>

    <div class="card">
      <p>Break-even</p>
      <h3 id="kpiBreakEven">-</h3>
    </div>

    <div class="card">
      <p>ROI</p>
      <h3 id="kpiRoi">0%</h3>
    </div>

  </section>

  <!-- GRÁFICOS -->
  <section id="graficos" class="tab">

    <div class="card">
      <canvas id="costEvolutionChart" class="chart"></canvas>
    </div>

    <div class="card">
      <canvas id="breakEvenChart" class="chart"></canvas>
    </div>

  </section>

</div>

<script>
function tab(id, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'))

  document.getElementById(id).classList.add('active')
  el.classList.add('active')
}
</script>

<script type="module" src="app.js"></script>

</body>
</html>
