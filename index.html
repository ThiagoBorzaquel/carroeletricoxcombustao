<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador TCO</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #0b1220;
      font-family: Manrope, sans-serif;
    }

    .card {
      background: #121a2b;
      border-radius: 16px;
      padding: 14px;
    }

    .input {
      width: 100%;
      height: 42px;
      background: #1a2235;
      border-radius: 10px;
      padding: 8px;
      color: white;
      font-size: 16px;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }
  </style>
</head>

<body class="text-white">

<!-- HEADER FIXO -->
<header class="sticky top-0 z-50 bg-[#0b1220] border-b border-white/10 p-3">
  <h1 class="text-lg font-bold">Simulador</h1>
</header>

<!-- KPI FIXO -->
<div class="p-3">
  <div class="card text-center">
    <p class="text-xs text-gray-400">Economia em 10 anos</p>
    <h2 id="kpiSavings" class="text-2xl font-bold">R$ 0</h2>
  </div>
</div>

<!-- NAV -->
<div class="flex justify-around text-sm border-b border-white/10 pb-2">
  <button onclick="showTab('form')">Dados</button>
  <button onclick="showTab('result')">Resultado</button>
  <button onclick="showTab('charts')">Gráficos</button>
</div>

<main class="p-3 space-y-4">

  <!-- FORM -->
  <section id="form" class="section active space-y-3">

    <div class="card space-y-3">
      <h3 class="text-sm text-gray-400">Dados principais</h3>

      <input class="input" type="number" name="evPrice" placeholder="Preço elétrico">
      <input class="input" type="number" name="icePrice" placeholder="Preço combustão">
      <input class="input" type="number" name="annualKm" placeholder="Km por ano">

      <button class="bg-green-500 text-black w-full py-2 rounded-lg">
        Calcular
      </button>
    </div>

  </section>

  <!-- RESULTADO -->
  <section id="result" class="section space-y-3">

    <div class="card">
      <p class="text-sm text-gray-400">Payback</p>
      <h3 id="kpiPayback" class="text-lg font-bold">-</h3>
    </div>

    <div class="card">
      <p class="text-sm text-gray-400">Break-even</p>
      <h3 id="kpiBreakEven">-</h3>
    </div>

    <div class="card">
      <p class="text-sm text-gray-400">ROI</p>
      <h3 id="kpiRoi">0%</h3>
    </div>

  </section>

  <!-- CHARTS -->
  <section id="charts" class="section space-y-3">

    <div class="card">
      <canvas id="costEvolutionChart"></canvas>
    </div>

    <div class="card">
      <canvas id="breakEvenChart"></canvas>
    </div>

  </section>

</main>

<script>
function showTab(tab) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}
</script>

<script type="module" src="app.js"></script>

</body>
</html>
