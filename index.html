<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador TCO</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background:#0b1220;
  font-family: Manrope, sans-serif;
  color:white;
  font-size:13px;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background:#0b1220;
  padding:8px 12px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* KPI */
.kpi {
  position: sticky;
  top: 44px;
  z-index: 40;
  padding:8px;
}

.kpi h2 {
  font-size:16px;
}

/* CARDS */
.card {
  background:#121a2b;
  border-radius:10px;
  padding:8px;
}

/* INPUT */
.input {
  width:100%;
  height:34px;
  background:#1a2235;
  border-radius:8px;
  padding:4px 8px;
  font-size:14px;
  margin-bottom:4px;
}

/* BOTÃO */
.btn {
  padding:6px;
  font-size:13px;
  border-radius:8px;
}

/* NAV */
.nav {
  display:flex;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.nav button {
  flex:1;
  padding:8px;
  font-size:12px;
  opacity:.6;
}

.nav button.active {
  opacity:1;
  border-bottom:2px solid #19c37d;
}

/* TABS */
.tab {
  display:none;
  padding:8px;
}

.tab.active {
  display:block;
}

/* CHART */
.chart {
  height:140px;
}

/* DESKTOP */
@media (min-width:1024px){

  .nav { display:none; }

  .tab {
    display:block !important;
  }

  body {
    display:grid;
    grid-template-columns:380px 1fr;
    gap:16px;
    max-width:1300px;
    margin:auto;
  }

  .header, .kpi {
    grid-column:1/-1;
    position:relative;
  }

  #dados { grid-column:1; }
  #resultado, #graficos { grid-column:2; }

  #graficos {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .chart {
    height:220px;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1 class="text-sm font-bold">Simulador</h1>
</div>

<!-- KPI -->
<div class="kpi">
  <div class="card text-center">
    <p class="text-[10px] text-gray-400">Economia</p>
    <h2 id="kpiSavings">R$ 0</h2>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="active" onclick="tab('dados', this)">Dados</button>
  <button onclick="tab('resultado', this)">Resultado</button>
  <button onclick="tab('graficos', this)">Gráficos</button>
</div>

<!-- DADOS -->
<div id="dados" class="tab active">

  <div class="card">

    <input class="input" placeholder="Preço elétrico" name="evPrice">
    <input class="input" placeholder="Preço combustão" name="icePrice">

    <div style="display:flex; gap:4px;">
      <input class="input" placeholder="Km/ano" name="annualKm">
      <input class="input" placeholder="Combustível" name="fuelPrice">
    </div>

    <div style="display:flex; gap:4px;">
      <input class="input" placeholder="Energia" name="energyPrice">
      <input class="input" placeholder="IPVA %" name="ipva">
    </div>

  </div>

  <button class="btn bg-green-500 text-black w-full mt-2">
    Calcular
  </button>

</div>

<!-- RESULTADO -->
<div id="resultado" class="tab">

  <div class="card">
    <p class="text-[10px] text-gray-400">Payback</p>
    <h3 id="kpiPayback">-</h3>
  </div>

  <div class="card mt-2">
    <p class="text-[10px] text-gray-400">Break-even</p>
    <h3 id="kpiBreakEven">-</h3>
  </div>

  <div class="card mt-2">
    <p class="text-[10px] text-gray-400">ROI</p>
    <h3 id="kpiRoi">0%</h3>
  </div>

</div>

<!-- GRÁFICOS -->
<div id="graficos" class="tab">

  <div class="card">
    <canvas id="costEvolutionChart" class="chart"></canvas>
  </div>

  <div class="card mt-2">
    <canvas id="breakEvenChart" class="chart"></canvas>
  </div>

</div>

<script>
function tab(id, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'))

  document.getElementById(id).classList.add('active')
  el.classList.add('active')
}
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
