<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carro Elétrico x Combustão | Simulador</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            slatebase: "#0b1220",
            card: "#121a2b",
            accent: "#19c37d"
          }
        }
      }
    };
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-slatebase text-white">

<header class="border-b border-white/10">
  <div class="mx-auto max-w-7xl px-4 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
    <div>
      <h1 class="text-xl sm:text-2xl font-bold">Carro Elétrico x Combustão</h1>
    </div>

    <button id="themeToggle" class="bg-white/10 px-3 py-2 rounded-lg text-sm w-full sm:w-auto">
      Alternar tema
    </button>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-6">

  <!-- GRID PRINCIPAL -->
  <section class="grid gap-4 lg:grid-cols-2">

    <!-- FORM -->
    <section class="bg-white/5 p-4 rounded-xl">

      <h2 class="text-lg font-bold mb-4">Simulação</h2>

      <form id="tcoForm" class="space-y-5">

        <div class="grid gap-3 sm:grid-cols-2">

          <label class="input-group">
            <span>Preço elétrico</span>
            <input type="number" name="evPrice" value="220000">
          </label>

          <label class="input-group">
            <span>Preço combustão</span>
            <input type="number" name="icePrice" value="145000">
          </label>

          <label class="input-group">
            <span>Km/ano</span>
            <input type="number" name="annualKm" value="18000">
          </label>

          <label class="input-group">
            <span>Preço energia</span>
            <input type="number" name="energyPrice" value="0.95">
          </label>

          <label class="input-group">
            <span>Preço combustível</span>
            <input type="number" name="fuelPrice" value="5.89">
          </label>

          <label class="input-group">
            <span>Estado</span>
            <select name="state"></select>
          </label>

        </div>

        <button type="submit" class="bg-accent text-black font-semibold">
          Calcular
        </button>

      </form>
    </section>

    <!-- RESULTADOS -->
    <aside class="space-y-4">

      <!-- KPIs -->
      <section class="bg-card p-4 rounded-xl">
        <h3 class="text-sm text-gray-400 mb-3">Resumo</h3>

        <div class="responsive-grid">

          <div class="kpi-card">
            <span>Economia</span>
            <strong id="kpiSavings">R$ 0</strong>
          </div>

          <div class="kpi-card">
            <span>Payback</span>
            <strong id="kpiPayback">-</strong>
          </div>

          <div class="kpi-card">
            <span>Break-even</span>
            <strong id="kpiBreakEven">-</strong>
          </div>

          <div class="kpi-card">
            <span>ROI</span>
            <strong id="kpiRoi">0%</strong>
          </div>

        </div>
      </section>

      <!-- TABELA -->
      <section class="bg-card p-4 rounded-xl">

        <h3 class="text-sm text-gray-400 mb-3">Horizontes</h3>

        <div class="table-scroll-wrapper">
          <table>
            <thead>
              <tr>
                <th>Período</th>
                <th>EV</th>
                <th>ICE</th>
                <th>Dif</th>
              </tr>
            </thead>
            <tbody id="summaryTableBody"></tbody>
          </table>
        </div>

      </section>

      <!-- VEREDITO -->
      <section class="bg-card p-4 rounded-xl">
        <h3 class="text-sm text-gray-400 mb-2">Veredito</h3>
        <p id="verdictHeadline" class="font-bold">Calculando...</p>
        <p id="verdictBody" class="text-sm text-gray-400"></p>
      </section>

    </aside>

  </section>

  <!-- CHARTS -->
  <section class="mt-6 space-y-4">

    <div class="bg-card p-4 rounded-xl">
      <h3 class="text-sm mb-2">Evolução</h3>
      <div class="chart-wrap">
        <canvas id="costEvolutionChart"></canvas>
      </div>
    </div>

    <div class="bg-card p-4 rounded-xl">
      <h3 class="text-sm mb-2">Break-even</h3>
      <div class="chart-wrap-sm">
        <canvas id="breakEvenChart"></canvas>
      </div>
    </div>

  </section>

</main>

<script type="module" src="app.js"></script>

</body>
</html>
